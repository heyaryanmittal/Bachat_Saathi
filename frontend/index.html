<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Professional Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0ea5e9">
    
    <!-- Mobile Web App Capable (cross-browser) -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BachatSaathi">
    
    <!-- Windows/Android -->
    <meta name="msapplication-TileColor" content="#0ea5e9">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- PWA Configuration -->
    <meta name="application-name" content="BachatSaathi">
    <meta name="format-detection" content="telephone=no">

    <!-- SEO Meta Tags -->
    <title>Bachat Saathi</title>
    <meta name="description" content="Take control of your finances with BachatSaathi. Track expenses, manage budgets, and achieve your financial goals with our comprehensive personal finance management platform.">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Bachat Saathi">
    <meta property="og:description" content="Take control of your finances with BachatSaathi. Track expenses, manage budgets, and achieve your financial goals.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">

    <!-- Accessibility -->
    <meta name="format-detection" content="telephone=no">

    <script>
      (function() {
        try {
          var darkMode = localStorage.getItem('darkMode');
          var isDark = darkMode ? JSON.parse(darkMode) : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
